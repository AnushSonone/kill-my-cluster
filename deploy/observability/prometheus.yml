# Prometheus scrapes the three metricsdemo node endpoints on the host.
# Docker Desktop (Mac/Windows): host.docker.internal reaches the host.
# Linux: add --add-host=host.docker.internal:host-gateway (compose does this).

global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: kill-my-cluster
    static_configs:
      - targets:
          - host.docker.internal:9101
          - host.docker.internal:9102
          - host.docker.internal:9103
        labels:
          cluster: local
