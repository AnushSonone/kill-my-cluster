# Oracle / hosted overlay. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.oracle.yml up -d --build
#
# Public: control plane :8080, Grafana :3001
# Private: Prometheus (no host port)
# UI: anush.wiki/blog/raft (local Svelte web service disabled)

services:
  web:
    profiles: ["local-ui"]

  # Oracle ladder 2026-07-21: peak sustained ~1413w/3233r (C5) with term flat
  # on 4 OCPU. Promote below peak for kill-headroom.
  loadgen:
    environment:
      WRITE_QPS: "1400"
      READ_QPS: "3000"
      WRITE_WORKERS: "64"
      READ_WORKERS: "128"

  prometheus:
    ports: !override []

  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://raft-grafana.anush.wiki
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: disabled
      GF_SECURITY_X_FRAME_OPTIONS: ""
