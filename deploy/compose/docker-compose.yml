# 7-node local demo cluster + Prometheus + Grafana + control plane.
# Kill UI:   http://localhost:8080
# Grafana:   http://localhost:3000  (admin/admin)
# Prom:      http://localhost:9090
#
# Auto-heal: control plane restarts/rejoins nodes ~2s after kill/partition.

name: kmc

services:

  node1:
    build: ../..
    container_name: kmc-node-1
    environment:
      NODE_ID: "1"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "true"
    volumes:
      - node1-data:/data
    networks: [kmc]
    restart: unless-stopped

  node2:
    build: ../..
    container_name: kmc-node-2
    environment:
      NODE_ID: "2"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node2-data:/data
    networks: [kmc]
    restart: unless-stopped

  node3:
    build: ../..
    container_name: kmc-node-3
    environment:
      NODE_ID: "3"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node3-data:/data
    networks: [kmc]
    restart: unless-stopped

  node4:
    build: ../..
    container_name: kmc-node-4
    environment:
      NODE_ID: "4"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node4-data:/data
    networks: [kmc]
    restart: unless-stopped

  node5:
    build: ../..
    container_name: kmc-node-5
    environment:
      NODE_ID: "5"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node5-data:/data
    networks: [kmc]
    restart: unless-stopped

  node6:
    build: ../..
    container_name: kmc-node-6
    environment:
      NODE_ID: "6"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node6-data:/data
    networks: [kmc]
    restart: unless-stopped

  node7:
    build: ../..
    container_name: kmc-node-7
    environment:
      NODE_ID: "7"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node7-data:/data
    networks: [kmc]
    restart: unless-stopped

  controlplane:
    build:
      context: ../..
      dockerfile: Dockerfile.controlplane
    container_name: kmc-controlplane
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      CONTROL_NODES: 1=kmc-node-1,2=kmc-node-2,3=kmc-node-3,4=kmc-node-4,5=kmc-node-5,6=kmc-node-6,7=kmc-node-7
      CONTROL_NETWORK: kmc_kmc
      HEAL_AFTER: 2s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    networks: [kmc]
    restart: unless-stopped

  web:
    build: ../../web
    container_name: kmc-web
    environment:
      HOST: 0.0.0.0
      PORT: "5173"
      CONTROLPLANE_URL: http://controlplane:8080
    ports:
      - "5173:5173"
    depends_on: [controlplane]
    networks: [kmc]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: kmc-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [kmc]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: kmc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [kmc]
    restart: unless-stopped

networks:
  kmc:
    driver: bridge
    name: kmc_kmc

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
  node5-data:
  node6-data:
  node7-data:
