# 7-node local demo cluster + Prometheus + Grafana + control plane.
# Kill UI:   http://localhost:8080
# Grafana:   http://localhost:3001  (admin/admin) — not :3000 (wiki owns that locally)
# Prom:      http://localhost:9090
# Graph UI:  http://localhost:5173  (Threlte/Three.js client-side; SVG fallback)
# Loadgen:   ~1.5K writes/s + ~10K reads/s (see loadgen service)
#
# Auto-heal: control plane restarts/rejoins machines ~10s after kill/partition.
#
# Oracle Always Free (Ampere A1 ~2 OCPU / 12 GB): 3D mesh is browser-only — do not
# add server-side WebGL. Budget RAM for this compose stack (~1–2 GB typical on Mac):
#   node1–7 ~100MB each, grafana ~250MB, prometheus ~100MB, CP+web ~40MB.
# If the VM is tight: lower Grafana retention, avoid extra sidecars, prefer arm64
# images — do not drop the client 3D bundle.

name: kmc

services:

  node1:
    build: ../..
    container_name: kmc-node-1
    environment:
      NODE_ID: "1"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      # Heartbeat off when loadgen is running (compose loadgen service).
      RUN_AGENT: "false"
    volumes:
      - node1-data:/data
    networks: [kmc]
    restart: unless-stopped

  node2:
    build: ../..
    container_name: kmc-node-2
    environment:
      NODE_ID: "2"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node2-data:/data
    networks: [kmc]
    restart: unless-stopped

  node3:
    build: ../..
    container_name: kmc-node-3
    environment:
      NODE_ID: "3"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,4=node4:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node3-data:/data
    networks: [kmc]
    restart: unless-stopped

  node4:
    build: ../..
    container_name: kmc-node-4
    environment:
      NODE_ID: "4"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,5=node5:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node4-data:/data
    networks: [kmc]
    restart: unless-stopped

  node5:
    build: ../..
    container_name: kmc-node-5
    environment:
      NODE_ID: "5"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,6=node6:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node5-data:/data
    networks: [kmc]
    restart: unless-stopped

  node6:
    build: ../..
    container_name: kmc-node-6
    environment:
      NODE_ID: "6"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,7=node7:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node6-data:/data
    networks: [kmc]
    restart: unless-stopped

  node7:
    build: ../..
    container_name: kmc-node-7
    environment:
      NODE_ID: "7"
      DATA_DIR: /data
      RAFT_ADDR: 0.0.0.0:7000
      KV_ADDR: 0.0.0.0:8000
      METRICS_ADDR: 0.0.0.0:9100
      PEERS: 1=node1:7000,2=node2:7000,3=node3:7000,4=node4:7000,5=node5:7000,6=node6:7000
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      RUN_AGENT: "false"
    volumes:
      - node7-data:/data
    networks: [kmc]
    restart: unless-stopped

  loadgen:
    build:
      context: ../..
      dockerfile: Dockerfile.loadgen
    container_name: kmc-loadgen
    environment:
      KV_PEERS: 1=node1:8000,2=node2:8000,3=node3:8000,4=node4:8000,5=node5:8000,6=node6:8000,7=node7:8000
      # Aligned to Oracle ladder ceiling (2026-07-21): ~1400w/3000r sustained
      # on A1 Flex 4 OCPU with term flat. Local may exceed; cloud is the claim.
      WRITE_QPS: "1400"
      READ_QPS: "3000"
      WRITE_WORKERS: "64"
      READ_WORKERS: "128"
    depends_on: [node1, node2, node3, node4, node5, node6, node7]
    networks: [kmc]
    restart: unless-stopped

  controlplane:
    build:
      context: ../..
      dockerfile: Dockerfile.controlplane
    container_name: kmc-controlplane
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      CONTROL_NODES: 1=kmc-node-1,2=kmc-node-2,3=kmc-node-3,4=kmc-node-4,5=kmc-node-5,6=kmc-node-6,7=kmc-node-7
      CONTROL_NETWORK: kmc_kmc
      HEAL_AFTER: 10s
      PROMETHEUS_URL: http://prometheus:9090
      ALLOW_RESET: "false"
      CORS_ORIGINS: https://anush.wiki,http://127.0.0.1:3000,http://localhost:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    networks: [kmc]
    restart: unless-stopped
    depends_on: [node1, node2, node3, node4, node5, node6, node7, prometheus]
  web:
    build: ../../web
    container_name: kmc-web
    environment:
      HOST: 0.0.0.0
      PORT: "5173"
      CONTROLPLANE_URL: http://controlplane:8080
    ports:
      - "5173:5173"
    depends_on: [controlplane]
    networks: [kmc]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: kmc-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [kmc]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: kmc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Allow embedding from wiki / local UI (host Grafana on :3001).
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: disabled
      GF_SECURITY_X_FRAME_OPTIONS: ""
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [kmc]
    restart: unless-stopped

networks:
  kmc:
    driver: bridge
    name: kmc_kmc

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
  node5-data:
  node6-data:
  node7-data:
