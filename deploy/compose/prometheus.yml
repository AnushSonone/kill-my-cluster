global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: kill-my-cluster
    static_configs:
      - targets:
          - node1:9100
          - node2:9100
          - node3:9100
          - node4:9100
          - node5:9100
          - node6:9100
          - node7:9100
        labels:
          cluster: docker

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          role: host
          cluster: docker
