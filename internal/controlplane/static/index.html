<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kill My Cluster — Control Plane</title>
  <style>
    :root {
      --bg: #0b0f14; --panel: #121a24; --border: #1e2d3d;
      --text: #e8eef4; --muted: #7a8fa3; --red: #ff5c5c; --green: #3dd68c; --gold: #f0c14b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #152030, var(--bg));
      color: var(--text); min-height: 100vh; padding: 1.5rem;
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.35rem; }
    .sub { color: var(--muted); margin-bottom: 1.25rem; font-size: 0.9rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); max-width: 900px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem;
    }
    .card.dead { opacity: 0.55; border-color: var(--red); }
    .card.running { border-color: #2a4a3a; }
    .title { font-weight: 600; margin-bottom: 0.35rem; }
    .meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
    .badge {
      display: inline-block; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 0.15rem 0.4rem; border-radius: 4px;
      background: #1a2634; margin-bottom: 0.75rem;
    }
    .badge.on { color: var(--green); }
    .badge.off { color: var(--red); }
    .actions { display: flex; gap: 0.4rem; }
    button {
      flex: 1; font: inherit; font-size: 0.8rem; padding: 0.45rem;
      border-radius: 6px; border: 1px solid var(--border);
      background: #1a2634; color: var(--text); cursor: pointer;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.kill { border-color: rgba(255,92,92,0.45); color: #ffb4b4; }
    button.restart { border-color: rgba(61,214,140,0.4); color: var(--green); }
    .toast { margin-top: 1rem; color: var(--muted); font-size: 0.85rem; min-height: 1.2em; }
    a { color: var(--gold); }
  </style>
</head>
<body>
  <h1>Kill My Cluster — Control Plane</h1>
  <p class="sub">Whitelist only: kill / restart node containers. Watch failover on <a href="http://localhost:3000" target="_blank">Grafana</a>.</p>
  <div class="grid" id="nodes"></div>
  <div class="toast" id="toast"></div>
  <script>
    const root = document.getElementById('nodes');
    const toast = document.getElementById('toast');

    async function refresh() {
      const res = await fetch('/api/nodes');
      const data = await res.json();
      root.innerHTML = '';
      for (const n of data.nodes || []) {
        const card = document.createElement('div');
        card.className = 'card ' + (n.running ? 'running' : 'dead');
        card.innerHTML = `
          <div class="title">Node ${n.id}</div>
          <div class="meta">${n.container}</div>
          <span class="badge ${n.running ? 'on' : 'off'}">${n.status}</span>
          <div class="actions">
            <button class="kill" ${n.running ? '' : 'disabled'}>Kill</button>
            <button class="restart" ${n.running ? 'disabled' : ''}>Restart</button>
          </div>`;
        card.querySelector('.kill').onclick = () => act(n.id, 'kill');
        card.querySelector('.restart').onclick = () => act(n.id, 'restart');
        root.appendChild(card);
      }
    }

    async function act(id, action) {
      toast.textContent = `${action} node ${id}…`;
      const res = await fetch(`/api/nodes/${id}/${action}`, { method: 'POST' });
      const text = await res.text();
      toast.textContent = res.ok ? `ok — ${action} node ${id}` : text;
      await refresh();
    }

    refresh();
    setInterval(refresh, 1500);
  </script>
</body>
</html>
